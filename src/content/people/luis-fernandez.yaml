name: Luis Fernández
position: Director
order: 4
photo: /images/people/luis-fernandez/photo.png
description: >-
  Es fundador y Director Ejecutivo de Práctica -Laboratorio para la Democracia-,
  una organización mexicana concentrada en fortalecer la participación y
  desarrollar capacidades de liderazgos de movimientos sociales. Ha dedicado más
  de 19 años a comprender y mejorar la relación entre la ciudadanía y el
  gobierno; desde el ámbito académico, en temas de participación ciudadana y
  gobernanza; desde el gobierno, en el diseño e implementación de políticas
  públicas participativas; y desde la sociedad civil, en temas de organización
  comunitaria y articulación para la incidencia.
