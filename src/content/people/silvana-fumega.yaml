name: Silvana Fumega
position: Directora
order: 7
photo: /images/people/silvana-fumega/photo.png
description: >-
  Investigadora y consultora internacional especializada en la intersección
  entre políticas públicas, datos e inclusión. Doctora (PhD) por la University
  of Tasmania y magíster en Políticas Públicas (MPP) por la Victoria University
  of Wellington. Actualmente se desempeña como Directora del Global Data
  Barometer, además de ser investigadora asociada de ILDA y del Data + Feminism
  Lab del MIT. Es cofundadora de Data Against Feminicide e integrante del
  directorio de The Data Tank.
