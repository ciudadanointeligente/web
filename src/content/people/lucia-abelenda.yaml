name: Lucía Abelenda
position: Directora
order: 4
photo: /images/people/lucia-abelenda/photo.png
description: >-
  Socióloga con una maestría en Ciencias Sociales y especialización en Opinión
  Pública. Con más de 15 años de experiencia en cooperación internacional, hoy
  es Directora General de Imaginarius, organización dedicada a construir
  capacidades en organizaciones y liderazgos. Ha ocupado diversos cargos que le
  han permitido adquirir un profundo conocimiento de la región. En este proceso,
  desarrolló cuatro fondos multi-actores para fortalecer grupos y procesos que
  buscan mejorar en tecnología cívica, gestión de datos, derechos digitales y
  participación. Ha aportado la perspectiva de América Latina en discusiones
  internacionales con organizaciones como las Naciones Unidas, la OEA y la UE.
