name: Lucía Dammert
position: Directora
order: 5
photo: /images/people/lucia-dammert/photo.png
description: >-
  Socióloga con maestría en políticas públicas y doctorado en ciencias
  políticas, ha escrito libros y artículos en revistas nacionales y extranjeras,
  así como ha sido docente y conferencista en temas vinculados a seguridad
  estratégica, políticas públicas y justicia criminal en múltiples países.
  Especialista en políticas públicas con amplia experiencia en seguridad
  ciudadana y reforma del Estado en América Latina.
