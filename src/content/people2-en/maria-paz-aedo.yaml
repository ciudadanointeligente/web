description: >-
  Sociologist from the University of Chile. Postgraduate in Gender and Society
  Studies from the Universidad Academia de Humanismo Cristiano. Master's in
  Ecological Humanities, Sustainability, and Ecosocial Transition from the
  Universitat Politècnica de València and Universidad Autónoma de Madrid. PhD in
  Education and postdoctoral researcher at the University of Santiago and the
  University of Barcelona. Extensive experience in training and research
  processes on issues of gender, political ecology, and just socio-ecological
  transitions.
