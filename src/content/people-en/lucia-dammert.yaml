name: Lucía Dammert
position: Board Member
order: 5
photo: /images/people/lucia-dammert/photo.png
description: >-
  Sociologist with a master's degree in public policy and a doctorate in
  political science, she has written books and articles in national and
  international journals, as well as being a teacher and lecturer on issues
  related to strategic security, public policies, and criminal justice in
  multiple countries. Specialist in public policies with extensive experience in
  citizen security and State reform in Latin America.
