name: Silvana Fumega
position: Board Member
order: 7
photo: /images/people/silvana-fumega/photo.png
description: >-
  Researcher and international consultant specialized in the intersection
  between public policies, data, and inclusion. PhD from the University of
  Tasmania and Master of Public Policy (MPP) from Victoria University of
  Wellington. She currently serves as Director of the Global Data Barometer, in
  addition to being a research associate at ILDA and the Data + Feminism Lab at
  MIT. She is co-founder of Data Against Feminicide and a member of the board of
  The Data Tank.
email: silfumega@gmail.com
