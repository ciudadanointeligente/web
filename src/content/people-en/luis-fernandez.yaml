name: Luis Fernández
position: Board Member
order: 6
photo: /images/people/luis-fernandez/photo.png
description: >-
  He is founder and Executive Director of Práctica -Laboratory for Democracy-,
  a Mexican organization focused on strengthening participation and developing
  leadership capacities of social movements. He has dedicated more than 19 years
  to understanding and improving the relationship between citizens and
  government; from academia, on citizen participation and governance; from
  government, in the design and implementation of participatory public policies;
  and from civil society, on community organization and articulation for
  advocacy.
