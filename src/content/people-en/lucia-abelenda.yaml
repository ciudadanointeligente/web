name: Lucía Abelenda
position: Board Member
order: 4
photo: /images/people/lucia-abelenda/photo.png
description: >-
  Sociologist with a master's degree in Social Sciences and specialization in
  Public Opinion. With more than 15 years of experience in international
  cooperation, she is currently General Director of Imaginarius, an organization
  dedicated to building capacities in organizations and leadership. She has held
  various positions that have allowed her to acquire deep knowledge of the
  region. In this process, she developed four multi-actor funds to strengthen
  groups and processes seeking to improve civic technology, data management,
  digital rights, and participation. She has brought the Latin American
  perspective to international discussions with organizations such as the United
  Nations, OAS, and EU.
