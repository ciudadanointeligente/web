name: Julieta Suárez Cao
position: Board Member
order: 2
photo: /images/people/julieta-suarez-cao/photo.jpg
description: >-
  Associate Professor in the area of Comparative Politics at the Catholic
  University of Chile. Coordinator of the Network of Political Scientists. PhD
  in Political Science from Northwestern University, United States. Her areas of
  specialization are political and governmental institutions, federalism and
  subnational politics, political parties, representation of women, and
  electoral systems. She participated in the design of the gender parity
  electoral system implemented for the Constitutional Convention elections in
  2021.
